# docker-compose.dev.yml
# 开发环境专用配置 - 代码实时同步
#
# 使用方式：
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# 特性：
# - 源代码 Bind Mount 到容器，修改后自动同步
# - 后端使用 Bun --watch 热重载
# - 前端使用 Vite HMR 热模块替换
# - 代码更新无需重建镜像，秒级生效

version: '3.8'

services:
  # ==================== Master 服务（开发模式）====================
  master:
    volumes:
      # ✅ 关键：挂载源代码，修改后自动同步到容器
      # 使用 :ro 表示只读，容器内无法修改宿主机代码
      - ./server/src:/app/src:ro
      - ./server/shared:/app/shared:ro
      # 保留原有卷
      - master_logs:/app/logs
      - ${HOST_WORKSPACE_PATH:-/data/claws/workspaces}:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    
    # ✅ 使用 Bun 的热重载模式
    # 修改代码后自动检测并重载（2-3 秒）
    command: ["bun", "run", "--watch", "src/index.ts"]
    
    # 开发环境增加资源限制（可选）
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
    
    # 开发环境变量（可选覆盖）
    environment:
      NODE_ENV: development
      # 开发模式日志更详细
      LOG_LEVEL: debug

  # ==================== Worker 服务（开发模式）====================
  worker:
    # 使用已构建的镜像
    image: claw-web-backend-worker:latest
    
    volumes:
      # ✅ 挂载 Worker 源代码
      - ./server/src:/app/src:ro
      - ./server/shared:/app/shared:ro
      # 保留工作空间和日志卷
      - worker_workspace:/workspace
      - worker_logs:/app/logs
    
    # ✅ 使用 Bun 的热重载模式
    command: ["bun", "run", "--watch", "src/index.ts"]
    
    environment:
      # 开发环境配置
      NODE_ENV: development
      PTY_ENABLED: "true"
      # 开发模式日志更详细
      LOG_LEVEL: debug
    
    networks:
      - worker-network
    
    # 开发环境增加资源
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ==================== Frontend 服务（开发模式）====================
  frontend:
    # ✅ 使用 Vite 开发服务器而非 Nginx 生产服务器
    # Vite 提供 HMR（热模块替换），修改代码后毫秒级更新
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "80"]
    
    volumes:
      # ✅ 挂载前端源代码
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
      # 挂载配置文件，修改后自动重载
      - ./web/vite.config.ts:/app/vite.config.ts:ro
      - ./web/index.html:/app/index.html:ro
    
    environment:
      - NODE_ENV=development
      - VITE_FEATURE_PTY_SHELL=true
      # 根据实际部署调整 API 地址
      - VITE_API_BASE_URL=http://localhost:3000
    
    # 开发环境增加资源
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

# 开发环境网络配置（复用主配置）
networks:
  frontend-network:
    driver: bridge
  
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  
  worker-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

# 开发环境卷配置（复用主配置）
volumes:
  master_logs:
    driver: local
    name: claw-web-master-logs
    
  worker_workspace:
    driver: local
    name: claw-web-worker-workspace
    
  worker_logs:
    driver: local
    name: claw-web-worker-logs
