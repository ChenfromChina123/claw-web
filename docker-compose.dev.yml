# Claude Code HAHA - 开发环境 Docker Compose（热重载模式）
#
# 特性：
# ✅ 热重载：改代码立即生效，无需 rebuild
# ✅ 后端：bun --watch 监听文件变化自动重启
# ✅ 前端：Vite HMR 浏览器热更新
# ✅ 前后端代码目录直接挂载（绕过 COPY）
#
# 使用方法：
# 1. 启动本文件全部服务（含独立 MySQL）：docker compose -f docker-compose.dev.yml up -d
# 2. 访问：http://localhost:5173（浏览器只连本机；API/WS 由 Vite 代理到容器 backend）
#
# 关于「两个 MySQL」：
# - docker-compose.yml 里的 claude-mysql：生产/默认栈，宿主机端口多为 3306
# - 本文件的 claude-mysql-dev：仅开发栈，宿主机 3308 -> 容器 3306，与生产库数据隔离
# 开发时不要同时需要两个库时，只起其中一套即可；本 dev 栈已自带 mysql，不必再开生产 mysql

services:
  # ==================== MySQL 数据库（开发环境） ====================
  mysql:
    image: mysql:8.0
    container_name: claude-mysql-dev
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: claude_code_haha
      MYSQL_USER: claude_user
      MYSQL_PASSWORD: userpassword123
      TZ: Asia/Shanghai
    ports:
      - "3308:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./server/src/db/fix_schema.sql:/docker-entrypoint-initdb.d/fix_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=50
      - --innodb_buffer_pool_size=67108864
    networks:
      - claude-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 后端开发服务（Bun + 热重载） ====================
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    container_name: claude-backend-dev
    restart: no
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=1024
      - UV_THREADPOOL_SIZE=8
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-3-opus-20240229}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-3-sonnet-20240229}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=claude_user
      - DB_PASSWORD=userpassword123
      - DB_NAME=claude_code_haha
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-min-32-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}
      - WORKSPACE_BASE_DIR=/app/workspaces
      - TENANT_ISOLATION_ENABLED=true
      - MAX_USERS=${MAX_USERS:-100}
      - USER_STORAGE_QUOTA_MB=${USER_STORAGE_QUOTA_MB:-500}
      - USER_SESSION_LIMIT=${USER_SESSION_LIMIT:-10}
      - USER_PTY_LIMIT=${USER_PTY_LIMIT:-5}
      - PTY_ENABLED=${PTY_ENABLED:-true}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILES_PER_USER=${MAX_FILES_PER_USER:-1000}
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-300000}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - DISABLE_TELEMETRY=1
    volumes:
      - ./server/src:/app/src:rw
      - ./server/package.json:/app/package.json:ro
      - ./server/tsconfig.json:/app/tsconfig.json:ro
      - backend_logs:/app/logs
    networks:
      - claude-network-dev
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ==================== 前端开发服务（Vite 热重载） ====================
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile.dev
    container_name: claude-frontend-dev
    restart: no
    ports:
      - "5173:5173"
    environment:
      # 浏览器只认相对路径 /api；Vite 进程用下面地址把 /api、/ws 转到后端容器
      - VITE_API_BASE_URL=
      - VITE_DEV_PROXY_TARGET=http://backend:3000
      - VITE_FEATURE_PTY_SHELL=true
    volumes:
      # 挂载源码：改 TS/Vue 立即生效，不必每次 docker build（node_modules 仍用镜像内）
      - ./web/src:/app/src:rw
      - ./web/index.html:/app/index.html:rw
      - ./web/vite.config.ts:/app/vite.config.ts:rw
      - ./web/.env.development:/app/.env.development:ro
    networks:
      - claude-network-dev

networks:
  claude-network-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  backend_logs:
    driver: local
  mysql_dev_data:
    driver: local
