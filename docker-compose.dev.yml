# docker-compose.dev.yml
# 开发环境专用配置 - 代码实时同步 + 热更新
#
# 使用方式：
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# 特性：
# ✅ 前端：Vite HMR 热模块替换（修改代码秒级生效）
# ✅ 后端：Bun --watch 热重载（2-3秒自动重启）
# ✅ Worker：保持生产模式（稳定运行）
# ✅ Bind Mount：源代码自动同步到容器

services:
  # ==================== Master 服务（开发模式）====================
  master:
    volumes:
      # ✅ 挂载源代码，修改后自动同步到容器
      - ./server/src:/app/src:ro
      - ./server/shared:/app/shared:ro
      # ✅ 挂载 package.json（依赖变更时自动同步）
      - ./server/package.json:/app/package.json:ro
      # 注意：不挂载 node_modules，使用镜像内置的依赖
      # 这样避免平台兼容性问题（Windows vs Linux）
      # 保留原有卷
      - master_logs:/app/logs
      - ${HOST_WORKSPACE_PATH:-/data/claws/workspaces}:/app/workspaces
      - /var/run/docker.sock:/var/run/docker.sock
    
    # ✅ 使用 Bun 热重载模式
    # 依赖使用镜像内置的，代码通过 volume 挂载实现热更新
    command: ["bun", "run", "--watch", "src/index.ts"]
    
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      # Worker源代码挂载路径（开发模式热更新）
      # Master容器内 /app/src/worker 包含Worker源代码
      WORKER_SRC_MOUNT: /app/src/worker
      WORKER_SHARED_MOUNT: /app/shared
    
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G

  # ==================== Worker 服务（开发模式）====================
  worker:
    image: claw-web-backend-worker:latest

    volumes:
      - worker_workspace:/workspace
      - worker_logs:/app/logs

    environment:
      NODE_ENV: development
      PTY_ENABLED: "true"
      LOG_LEVEL: debug
    
    networks:
      - worker-network
      - claude-network       # ✅ 联网支持
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

  # ==================== Frontend 服务（开发模式）====================
  frontend:
    # ✅ 使用 Node.js 镜像运行 Vite 开发服务器
    image: node:20-alpine

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "[Frontend] 检查依赖..."
        if [ ! -d "node_modules" ] || [ ! -f "node_modules/.bin/vite" ]; then
          echo "[Frontend] 安装依赖..."
          npm install --legacy-peer-deps
        fi
        
        echo "[Frontend] 启动 Vite 开发服务器 (HMR)..."
        echo "[Frontend] 访问地址: http://localhost:5173"
        exec npm run dev -- --host 0.0.0.0 --port 5173

    working_dir: /app

    ports:
      # ✅ 开发模式使用 5173 端口（避免与生产 80 端口冲突）
      - "${FRONTEND_PORT:-5173}:5173"

    volumes:
      # ✅ 挂载前端源代码（修改后自动同步）
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
      
      # ✅ 挂载配置文件（修改后自动重载）
      - ./web/vite.config.ts:/app/vite.config.ts:ro
      - ./web/index.html:/app/index.html:ro
      - ./web/tsconfig.json:/app/tsconfig.json:ro
      - ./web/tsconfig.node.json:/app/tsconfig.node.json:ro  # ✅ Vite Node.js 构建配置
      
      # ✅ 挂载 package 文件（用于依赖安装检测）
      - ./web/package.json:/app/package.json:ro
      - ./web/package-lock.json:/app/package-lock.json:ro
      
      # ✅ 持久化 node_modules（避免每次重启重新安装）
      - frontend_node_modules:/app/node_modules

    environment:
      - NODE_ENV=development
      - VITE_FEATURE_PTY_SHELL=true
      # ✅ 关键：设置 API 代理目标为 Master 容器
      - VITE_DEV_PROXY_TARGET=http://master:3000
    
    networks:
      - claude-network       # ✅ 连接到主网络以访问 Master
      - worker-network       # ✅ 连接到 Worker 网络以访问部署的项目
    
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
