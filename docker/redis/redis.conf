# Redis 配置文件

# 绑定地址（允许所有网络接口）
bind 0.0.0.0

# 监听端口
port 6379

# 密码认证（生产环境必须设置）
# requirepass your_redis_password_here

# 持久化配置
save 900 1
save 300 10
save 60 10000

# RDB 文件名
dbfilename dump.rdb

# 工作目录
dir /data

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 最大客户端数
maxclients 10000

# TCP keepalive
tcp-keepalive 300

# 超时设置
timeout 0
