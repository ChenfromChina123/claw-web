<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Claude Code HAHA - Agent Workflow Prototype</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .agent-node { border-left: 2px dashed #4b5563; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

<div id="app" class="max-w-4xl mx-auto p-8">
    <header class="mb-8 border-b border-gray-700 pb-4 flex justify-between items-end">
        <div>
            <h1 class="text-2xl font-bold text-blue-400">Claude Code HAHA</h1>
            <p class="text-gray-400 text-sm">Agent 流程监控控制台 (厚后端架构方案)</p>
        </div>
        <button @click="simulateEvent" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm transition">
            模拟后端推送事件
        </button>
    </header>

    <div class="space-y-6">
        <agent-workflow :node="rootNode"></agent-workflow>
    </div>
</div>

<script type="text/x-template" id="agent-workflow-template">
    <div class="mb-4">
        <div class="flex items-center space-x-3 mb-2">
            <div :class="['w-3 h-3 rounded-full', statusColor]"></div>
            <span class="font-mono font-bold text-blue-300">[{{ node.agentType }}]</span>
            <span class="text-xs text-gray-500">ID: {{ node.agentId }}</span>
        </div>

        <div class="agent-node ml-1.5 pl-6 space-y-3">
            <div v-for="step in node.steps" :key="step.id" class="relative">
                <div class="absolute -left-[1.95rem] top-2 w-2 h-2 rounded-full bg-gray-600 border border-gray-900"></div>
                
                <div class="bg-gray-800 border border-gray-700 p-3 rounded-lg shadow-sm">
                    <div class="flex justify-between items-start">
                        <span class="text-sm font-medium">{{ step.label }}</span>
                        <span :class="['text-[10px] px-1.5 py-0.5 rounded uppercase', stepStatusClass(step.status)]">
                            {{ step.status }}
                        </span>
                    </div>
                    <p class="text-xs text-gray-400 mt-1">{{ step.content }}</p>
                    
                    <div v-if="step.status === 'intercepted'" class="mt-3 p-2 bg-orange-900/30 border border-orange-700 rounded flex gap-2">
                        <span class="text-xs text-orange-200 flex-1">⚠️ 发现高危命令: <b>rm -rf /test</b></span>
                        <button class="text-[10px] bg-orange-600 px-2 py-1 rounded">允许执行</button>
                        <button class="text-[10px] bg-gray-600 px-2 py-1 rounded">拒绝</button>
                    </div>

                    <div v-if="step.childAgent" class="mt-4">
                        <agent-workflow :node="step.childAgent"></agent-workflow>
                    </div>
                </div>
            </div>

            <div v-if="node.isRunning" class="flex items-center text-xs text-gray-500 pulse">
                <span class="mr-2">●</span> Agent 正在处理中...
            </div>
        </div>
    </div>
</script>

<script>
    const { createApp, ref, computed } = Vue;

    // 递归组件定义
    const AgentWorkflow = {
        name: 'AgentWorkflow',
        props: ['node'],
        template: '#agent-workflow-template',
        setup(props) {
            const statusColor = computed(() => {
                if (props.node.isRunning) return 'bg-blue-500 pulse';
                return 'bg-green-500';
            });

            const stepStatusClass = (status) => {
                const map = {
                    'success': 'bg-green-900 text-green-300',
                    'running': 'bg-blue-900 text-blue-300',
                    'intercepted': 'bg-orange-900 text-orange-300',
                    'failed': 'bg-red-900 text-red-300'
                };
                return map[status] || 'bg-gray-700 text-gray-300';
            };

            return { statusColor, stepStatusClass };
        }
    };

    createApp({
        components: { AgentWorkflow },
        setup() {
            // 模拟初始状态（后端发送的第一个 Trace）
            const rootNode = ref({
                agentId: 'main-orchestrator',
                agentType: 'Plan',
                isRunning: true,
                steps: [
                    { id: 1, label: '解析用户意图', content: '用户要求重构项目文件结构', status: 'success' },
                    { id: 2, label: '生成执行计划', content: '识别到 3 个子任务：扫描、修改、验证', status: 'success' }
                ]
            });

            // 模拟后端推送事件流（模拟 Fork 过程）
            let eventCount = 0;
            const simulateEvent = () => {
                eventCount++;
                if (eventCount === 1) {
                    // 推送：派生子 Agent
                    rootNode.value.steps.push({
                        id: 3,
                        label: '派生扫描任务',
                        content: '启动 Explore 代理扫描 src 目录',
                        status: 'running',
                        childAgent: {
                            agentId: 'sub-explore-001',
                            agentType: 'Explore',
                            isRunning: true,
                            steps: [
                                { id: 101, label: '列出文件', content: 'ls -R ./src', status: 'success' },
                                { id: 102, label: '读取关键配置', content: 'read package.json', status: 'intercepted' }
                            ]
                        }
                    });
                } else if (eventCount === 2) {
                    // 推送：主任务完成
                    rootNode.value.isRunning = false;
                    rootNode.value.steps[2].status = 'success';
                }
            };

            return { rootNode, simulateEvent };
        }
    }).mount('#app');
</script>
</body>
</html>
