<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Claude Code HAHA - 文件上传版</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .workflow-line { border-left: 2px solid #334155; }
        .pulse-blue { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }
        /* 文件预览进入动画 */
        .file-tag-enter-active { transition: all 0.3s ease; }
        .file-tag-enter-from { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 overflow-hidden">

<div id="app" class="h-screen flex flex-col relative">
    
    <header class="flex-none flex items-center justify-between p-4 border-b border-slate-800 bg-slate-950/50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 bg-blue-600 rounded flex items-center justify-center font-bold text-xs text-white">C</div>
            <h1 class="text-sm font-semibold">Claude Code HAHA</h1>
        </div>
        <button @click="resetDemo" class="text-[10px] text-slate-500 hover:text-slate-300">清空看板</button>
    </header>

    <main class="flex-1 overflow-y-auto p-6 pb-48 no-scrollbar">
        <div class="max-w-3xl mx-auto">
            <agent-workflow v-if="rootNode" :node="rootNode" @signal="handleSignal"></agent-workflow>
            <div v-else class="h-64 flex flex-col items-center justify-center text-slate-700">
                <p class="text-sm italic font-light">就绪。上传代码或输入指令开始...</p>
            </div>
        </div>
    </main>

    <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent">
        <div class="max-w-3xl mx-auto relative">
            
            <div class="flex flex-wrap gap-2 mb-3">
                <transition-group name="file-tag">
                    <div v-for="(file, index) in uploadedFiles" :key="file.name" 
                         class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 flex items-center gap-2 group shadow-xl">
                        <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-width="2"/></svg>
                        <span class="text-[11px] font-mono text-slate-300 max-w-[120px] truncate">{{ file.name }}</span>
                        <div v-if="file.status === 'uploading'" class="w-12 h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div class="h-full bg-blue-500 animate-[pulse_1s_infinite]"></div>
                        </div>
                        <button @click="removeFile(index)" class="text-slate-600 hover:text-red-400 transition ml-1">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"/></svg>
                        </button>
                    </div>
                </transition-group>
            </div>

            <div :class="['transition-all rounded-2xl border bg-slate-900 flex items-end p-2', 
                         isSimulating ? 'border-blue-500/30' : 'border-slate-800 focus-within:border-slate-600 shadow-2xl']">
                
                <button @click="$refs.fileInput.click()" :disabled="isSimulating"
                        class="p-2.5 text-slate-500 hover:text-blue-400 transition-colors rounded-xl hover:bg-slate-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                    <input type="file" ref="fileInput" class="hidden" multiple @change="handleFileUpload">
                </button>

                <textarea v-model="userInput" @keydown.enter.prevent="handleAction"
                    placeholder="Describe your task or upload files..."
                    class="flex-1 bg-transparent border-none focus:ring-0 text-sm p-3 h-12 max-h-32 resize-none no-scrollbar"
                ></textarea>

                <button @click="handleAction" :disabled="!isSimulating && !userInput.trim() && uploadedFiles.length === 0"
                    :class="['p-2.5 rounded-xl transition-all', isSimulating ? 'bg-red-500/20 text-red-500' : 'bg-blue-600 text-white shadow-lg shadow-blue-900/20']">
                    <svg v-if="isSimulating" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><rect x="5" y="5" width="10" height="10" rx="1" /></svg>
                    <svg v-else class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script type="text/x-template" id="agent-template">
    <div class="mb-10">
        <div class="flex items-center gap-3 mb-5">
            <div :class="['w-1.5 h-1.5 rounded-full', node.isRunning ? 'bg-blue-500 pulse-blue' : 'bg-slate-700']"></div>
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest bg-slate-900 px-2 py-0.5 rounded border border-slate-800">
                {{ node.agentType }} <span class="text-slate-700 mx-1">|</span> {{ node.agentId }}
            </div>
        </div>
        <div class="workflow-line ml-0.5 pl-8 space-y-6">
            <div v-for="step in node.steps" :key="step.id" class="relative">
                <div :class="['absolute -left-[2.35rem] top-1.5 w-3 h-3 rounded-full border-4 border-slate-950 transition-all', 
                             step.status === 'success' ? 'bg-emerald-500' : 'bg-slate-700']"></div>
                <div>
                    <div class="flex justify-between items-baseline">
                        <h4 class="text-xs font-bold text-slate-300 uppercase">{{ step.label }}</h4>
                        <span class="text-[9px] font-mono text-slate-600">{{ step.timestamp }}</span>
                    </div>
                    <p class="text-[11px] text-slate-500 mt-1 leading-relaxed">{{ step.content }}</p>
                    <div v-if="step.childAgent" class="mt-8">
                        <agent-workflow :node="step.childAgent" @signal="(e) => $emit('signal', e)"></agent-workflow>
                    </div>
                </div>
            </div>
        </div>
    </div>
</script>

<script>
const { createApp, ref } = Vue;

const AgentWorkflow = {
    name: 'AgentWorkflow',
    props: ['node'],
    emits: ['signal'],
    template: '#agent-template'
};

createApp({
    components: { AgentWorkflow },
    setup() {
        const userInput = ref('');
        const uploadedFiles = ref([]);
        const rootNode = ref(null);
        const isSimulating = ref(false);

        // 模拟文件上传逻辑
        const handleFileUpload = (event) => {
            const files = Array.from(event.target.files);
            files.forEach(file => {
                const fileObj = { name: file.name, status: 'uploading' };
                uploadedFiles.value.push(fileObj);
                
                // 模拟后端上传延迟
                setTimeout(() => {
                    fileObj.status = 'ready';
                }, 1500);
            });
        };

        const removeFile = (index) => {
            uploadedFiles.value.splice(index, 1);
        };

        const handleAction = () => {
            if (isSimulating.value) {
                isSimulating.value = false;
                return;
            }
            if (!userInput.value.trim() && uploadedFiles.value.length === 0) return;
            
            isSimulating.value = true;
            rootNode.value = {
                agentId: 'orchestrator-alpha',
                agentType: 'Plan',
                isRunning: true,
                steps: [
                    { 
                        id: 's1', 
                        label: '解析任务上下文', 
                        status: 'success', 
                        content: uploadedFiles.value.length > 0 
                            ? `已加载文件: ${uploadedFiles.value.map(f => f.name).join(', ')}。正在分析代码结构...`
                            : `分析用户指令: ${userInput.value}`,
                        timestamp: '14:20:01' 
                    }
                ]
            };
            
            // 任务启动后清空上传列表（模拟已送往后端）
            uploadedFiles.value = [];
        };

        const resetDemo = () => {
            rootNode.value = null;
            userInput.value = '';
            uploadedFiles.value = [];
            isSimulating.value = false;
        };

        const handleSignal = (e) => console.log("Signal:", e);

        return { userInput, uploadedFiles, rootNode, isSimulating, handleFileUpload, removeFile, handleAction, resetDemo, handleSignal };
    }
}).mount('#app');
</script>
</body>
</html>
