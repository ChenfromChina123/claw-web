# Claw-Web - 前端直连 Docker 后端 开发配置
#
# 特性：
# - 前端：本地直接启动（npm run dev），支持热重载
# - 后端：Docker 容器运行，稳定可靠
# - 数据库：Docker 容器运行
#
# 使用方法：
# 1. 启动后端和数据库：docker compose -f docker-compose.dev-local.yml up -d
# 2. 启动前端：cd web && npm run dev
# 3. 访问：http://localhost:5173
#
# 端口说明：
#   - 前端(本地): 5173
#   - 后端(Docker): 3000
#   - MySQL(Docker): 3306

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: claude-mysql-dev-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-claude_code_haha}
      MYSQL_USER: ${DB_USER:-claude_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword123}
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_dev_local_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./server/src/db/z_fix_schema.sql:/docker-entrypoint-initdb.d/z_fix_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=100
      - --innodb_buffer_pool_size=134217128
      - --innodb_log_file_size=67108864
      - --innodb_flush_log_at_trx_commit=2
    networks:
      - claude-network-dev-local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 后端服务（Docker 容器）====================
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUN_INSTALL_REGISTRY: https://registry.npmmirror.com
    container_name: claude-backend-dev-local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 基础配置
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=512
      - UV_THREADPOOL_SIZE=4
      - PORT=3000
      - CONTAINER_ROLE=master

      # AI API 配置
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-3-opus-20240229}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-3-sonnet-20240229}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

      # 数据库配置
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-claude_user}
      - DB_PASSWORD=${DB_PASSWORD:-userpassword123}
      - DB_NAME=${DB_NAME:-claude_code_haha}

      # JWT 认证配置
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-min-32-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}

      # 邮件配置
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}

      # 工作区配置
      - WORKSPACE_BASE_DIR=/app/workspaces

      # 多租户隔离配置
      - TENANT_ISOLATION_ENABLED=true
      - MAX_USERS=${MAX_USERS:-100}
      - USER_STORAGE_QUOTA_MB=${USER_STORAGE_QUOTA_MB:-500}
      - USER_SESSION_LIMIT=${USER_SESSION_LIMIT:-10}
      - USER_PTY_LIMIT=${USER_PTY_LIMIT:-5}
      - PTY_ENABLED=${PTY_ENABLED:-true}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILES_PER_USER=${MAX_FILES_PER_USER:-1000}

      # 其他配置
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-300000}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - DISABLE_TELEMETRY=1

      # 容器编排配置（开发环境可以禁用或减少）
      - CONTAINER_POOL_MIN_SIZE=${CONTAINER_POOL_MIN_SIZE:-1}
      - CONTAINER_POOL_MAX_SIZE=${CONTAINER_POOL_MAX_SIZE:-3}
      - DOCKER_NETWORK_NAME=claude-network-dev-local
    volumes:
      - user_workspaces:/app/workspaces/users
      - session_workspaces:/app/workspaces/sessions
      - backend_logs:/app/logs
      # 挂载 Docker socket 用于容器编排
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - claude-network-dev-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 384M

networks:
  claude-network-dev-local:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/16

volumes:
  mysql_dev_local_data:
    driver: local
  user_workspaces:
    driver: local
  session_workspaces:
    driver: local
  backend_logs:
    driver: local
