<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional IDE - Final Refined</title>
  
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus@2.6.3/dist/index.full.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.6.3/dist/index.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.6.3/theme-chalk/dark/css-vars.css">
  <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/splitpanes@3.1.5/dist/splitpanes.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/splitpanes@3.1.5/dist/splitpanes.css">
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js"></script>

  <style>
    /* 基础重置 */
    * { box-sizing: border-box; }
    :root {
      --ide-bg: #1e1e1e;
      --ide-sidebar: #252526;
      --ide-activity: #333333;
      --ide-header: #2d2d2d;
      --ide-border: #3c3c3c;
      --ide-accent: #007acc;
    }
    
    body, html, #app { 
      height: 100vh; width: 100vw; margin: 0; 
      background: var(--ide-bg); overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
    }

    /* 整体布局容器 */
    .ide-wrapper { display: flex; height: 100%; width: 100%; }

    /* 1. 左侧活动栏 - 全屏高度 */
    .activity-bar {
      width: 48px;
      height: 100%;
      background: var(--ide-activity);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 15px;
      gap: 20px;
      flex-shrink: 0;
      border-right: 1px solid #111;
      z-index: 10;
    }
    .activity-item {
      cursor: pointer;
      color: #858585;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      position: relative;
    }
    .activity-item:hover { color: #fff; }
    .activity-item.active { color: #fff; }
    .activity-item.active::before {
      content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 2px; background: #fff;
    }

    /* 2. 右侧主体 */
    .main-workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0; /* 修复 flex 子元素宽度溢出 */
    }

    /* 顶部 Project 栏 */
    .project-header {
      height: 35px;
      background: var(--ide-header);
      border-bottom: 1px solid var(--ide-border);
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 12px;
      color: #ccc;
    }

    /* 3. 分割面板自定义 - 极简风格 */
    .splitpanes--vertical > .splitpanes__splitter {
      width: 1px !important;
      background: var(--ide-border) !important;
      border: none !important;
      transition: background 0.3s;
    }
    .splitpanes--vertical > .splitpanes__splitter:hover {
      background: var(--ide-accent) !important;
      width: 3px !important;
    }
    .splitpanes--horizontal > .splitpanes__splitter {
      height: 1px !important;
      background: var(--ide-border) !important;
    }

    /* 模块样式 */
    .module-container { height: 100%; display: flex; flex-direction: column; background: var(--ide-sidebar); }
    .module-header {
      height: 35px; background: var(--ide-header);
      display: flex; align-items: center; padding: 0 12px;
      font-size: 11px; font-weight: bold; color: #969696;
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* 编辑器区域 */
    .editor-box { flex: 1; background: #1e1e1e; overflow: hidden; }

    /* 聊天界面 */
    .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--ide-bg); overflow: hidden; }
    .msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
    .msg-item { max-width: 85%; padding: 8px 12px; border-radius: 4px; font-size: 13px; line-height: 1.5; }
    .msg-ai { align-self: flex-start; background: var(--ide-header); border: 1px solid var(--ide-border); color: #ccc; }
    .msg-user { align-self: flex-end; background: var(--ide-accent); color: #fff; }

    /* 聊天输入框 - 完美对齐 */
    .chat-input-box {
      padding: 12px; background: var(--ide-sidebar);
      border-top: 1px solid var(--ide-border);
    }
    .chat-input-box .el-textarea__inner {
      background: #3c3c3c !important; border: 1px solid #555 !important; color: #fff !important;
    }

    [v-cloak] { display: none; }
  </style>
</head>
<body class="dark">
  <div id="app" v-cloak>
    <div class="ide-wrapper">
      
      <div class="activity-bar">
        <div class="activity-item" :class="{active: leftVisible}" @click="leftVisible = !leftVisible">
          <el-icon><Files /></el-icon>
        </div>
        <div class="activity-item" :class="{active: rightVisible}" @click="rightVisible = !rightVisible">
          <el-icon><ChatLineRound /></el-icon>
        </div>
        <div class="activity-item" @click="toggleAgentFull">
          <el-icon><Monitor /></el-icon>
        </div>
        <div style="flex:1"></div>
        <div class="activity-item"><el-icon><Setting /></el-icon></div>
      </div>

      <div class="main-workspace">
        <div class="project-header">
          <span style="color: #6a9955; margin-right: 8px;">// PROJECT</span>
          <span>My-Code-Project / {{ currentFile }}</span>
        </div>

        <splitpanes class="default-theme" style="flex: 1;">
          <pane v-if="leftVisible" :size="20">
            <div class="module-container">
              <div class="module-header">Explorer</div>
              <el-tree 
                :data="fileData" 
                style="background: transparent; color: #ccc; margin-top: 5px;" 
                highlight-current 
                default-expand-all 
              />
            </div>
          </pane>

          <pane v-if="editorVisible" :size="editorSize">
            <div class="module-container" style="background: #1e1e1e;">
              <div class="module-header" style="background: #252526">{{ currentFile }}</div>
              <div id="monaco-editor-view" style="flex: 1;"></div>
            </div>
          </pane>

          <pane v-if="rightVisible" :size="rightSize">
            <splitpanes horizontal>
              <pane size="70">
                <div class="module-container" style="border-left: 1px solid var(--ide-border);">
                  <div class="module-header">AI Agent</div>
                  <div class="chat-area">
                    <div class="msg-list">
                      <div v-for="m in messages" :key="m.id" :class="['msg-item', m.role === 'ai' ? 'msg-ai' : 'msg-user']">
                        {{ m.content }}
                      </div>
                    </div>
                    <div class="chat-input-box">
                      <el-input 
                        v-model="inputMsg" 
                        type="textarea" 
                        :rows="2" 
                        placeholder="Ask AI assistant..." 
                        @keydown.enter.prevent="sendMessage"
                      />
                    </div>
                  </div>
                </div>
              </pane>
              <pane size="30">
                <div class="module-container" style="border-left: 1px solid var(--ide-border); border-top: 1px solid var(--ide-border);">
                  <div class="module-header">Sessions</div>
                  <div style="padding: 10px; font-size: 12px; color: #858585;">
                    No recent sessions.
                  </div>
                </div>
              </pane>
            </splitpanes>
          </pane>
        </splitpanes>
      </div>

    </div>
  </div>

  <script>
    const { createApp, ref, onMounted } = Vue;
    const { Splitpanes, Pane } = splitpanes;

    const app = createApp({
      components: { Splitpanes, Pane },
      setup() {
        const leftVisible = ref(true);
        const rightVisible = ref(true);
        const editorVisible = ref(true);
        
        const editorSize = ref(50);
        const rightSize = ref(30);
        const currentFile = ref('main.js');
        const inputMsg = ref('');
        const messages = ref([
          { id: 1, role: 'ai', content: '你好！布局已按标准 IDE 比例修复。' }
        ]);

        const fileData = [{ 
          label: 'src', 
          children: [{ label: 'main.js' }, { label: 'utils.js' }] 
        }, { label: 'index.html' }];

        // 初始化编辑器
        const initMonaco = () => {
          window.require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs' }});
          window.require(['vs/editor/editor.main'], () => {
            monaco.editor.create(document.getElementById('monaco-editor-view'), {
              value: "// 布局重构完成\nfunction debug() {\n  console.log('IDE Layout Fixed');\n}",
              language: 'javascript',
              theme: 'vs-dark',
              automaticLayout: true,
              fontSize: 14,
              minimap: { enabled: true }
            });
          });
        };

        const sendMessage = () => {
          if (!inputMsg.value.trim()) return;
          messages.value.push({ id: Date.now(), role: 'user', content: inputMsg.value });
          inputMsg.value = '';
        };

        const toggleAgentFull = () => {
          if (editorVisible.value) {
            leftVisible.value = false;
            editorVisible.value = false;
            rightVisible.value = true;
          } else {
            leftVisible.value = true;
            editorVisible.value = true;
          }
        };

        onMounted(initMonaco);

        return {
          leftVisible, rightVisible, editorVisible,
          editorSize, rightSize, currentFile,
          fileData, messages, inputMsg,
          sendMessage, toggleAgentFull
        };
      }
    });

    // 注册图标
    for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
      app.component(key, component);
    }
    
    app.use(ElementPlus);
    app.mount('#app');
  </script>
</body>
</html>
