# Claw-Web - 部署版本 Docker Compose（生产环境 - Master-Worker 架构）
#
# 使用方法：
# 1. 确保已安装 Docker Desktop
# 2. 运行：docker compose -f docker-compose.yml up -d --build
# 3. 访问：http://localhost:8888
#
# 架构说明：
#   - backend-master: 主控制服务（认证、路由、容器调度）
#   - worker: Worker容器模板（由master动态创建和管理）
#
# 端口说明：
#   - 前端: 8888
#   - Master后端: 3000
#   - Worker动态端口: 3100-3200
#   - MySQL: 3306

services:
  # ==================== MySQL 数据库（国内镜像）====================
  # 使用官方镜像，建议配置 Docker 镜像加速器
  mysql:
    image: mysql:8.0
    container_name: claude-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-claude_code_haha}
      MYSQL_USER: ${DB_USER:-claude_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword123}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./server/src/db/z_fix_schema.sql:/docker-entrypoint-initdb.d/z_fix_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=100
      - --innodb_buffer_pool_size=134217128
      - --innodb_log_file_size=67108864
      - --innodb_flush_log_at_trx_commit=2
      - --key_buffer_size=16777216
      - --sort_buffer_size=2097152
      - --read_buffer_size=131072
      - --read_rnd_buffer_size=262144
      - --tmp_table_size=16777216
      - --max_heap_table_size=16777216
      - --table_open_cache=400
      - --thread_cache_size=8
      - --slow_query_log=1
      - --long_query_time=2
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M

  # ==================== Master 后端服务（主控制器）====================
  # 功能：
  # - 用户认证与授权
  # - API请求路由到Worker容器
  # - WebSocket连接管理
  # - 容器生命周期管理（创建/销毁/调度）
  # - 资源监控与配额管理
  backend-master:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        BUN_INSTALL_REGISTRY: https://registry.npmmirror.com
    container_name: claude-backend-master
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # 运行模式标识
      - ROLE=master
      # Node.js优化配置
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=512
      - UV_THREADPOOL_SIZE=4
      # API密钥配置
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-3-opus-20240229}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-3-sonnet-20240229}
      # 数据库配置
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-claude_user}
      - DB_PASSWORD=${DB_PASSWORD:-userpassword123}
      - DB_NAME=${DB_NAME:-claude_code_haha}
      # JWT认证配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production-min-32-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      # 邮件配置
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}
      # 工作区配置
      - WORKSPACE_BASE_DIR=/app/workspaces
      # 多租户隔离配置
      - TENANT_ISOLATION_ENABLED=true
      - MAX_USERS=${MAX_USERS:-100}
      - USER_STORAGE_QUOTA_MB=${USER_STORAGE_QUOTA_MB:-500}
      - USER_SESSION_LIMIT=${USER_SESSION_LIMIT:-10}
      - USER_PTY_LIMIT=${USER_PTY_LIMIT:-5}
      - PTY_ENABLED=${PTY_ENABLED:-true}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILES_PER_USER=${MAX_FILES_PER_USER:-1000}
      # 容器编排配置
      - CONTAINER_POOL_MIN_SIZE=${CONTAINER_POOL_MIN_SIZE:-3}
      - CONTAINER_POOL_MAX_SIZE=${CONTAINER_POOL_MAX_SIZE:-10}
      - CONTAINER_IDLE_TIMEOUT_MS=${CONTAINER_IDLE_TIMEOUT_MS:-300000}
      - CONTAINER_BASE_PORT=${CONTAINER_BASE_PORT:-3100}
      - WORKER_IMAGE_NAME=claw-web-backend-worker:latest
      # 其他配置
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-300000}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - DISABLE_TELEMETRY=1
    volumes:
      # 挂载Docker socket（用于管理Worker容器）
      - /var/run/docker.sock:/var/run/docker.sock
      # 用户工作空间（共享给所有Worker容器）
      - user_workspaces:/app/workspaces/users
      - session_workspaces:/app/workspaces/sessions
      # 日志目录
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.5'
        reservations:
          memory: 384M

  # ==================== 前端服务（本地构建，使用国内镜像加速）====================
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    container_name: claude-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8888}:80"
    environment:
      - VITE_FEATURE_PTY_SHELL=true
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-master  # 依赖Master服务而非旧的backend
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
        reservations:
          memory: 32M

  # ==================== Worker 容器镜像构建模板 ====================
  # 注意：此服务不会直接运行，仅用于构建Worker镜像
  # Master服务会动态创建和管理Worker容器实例
  worker-build:
    build:
      context: .
      dockerfile: server/Dockerfile.worker
      args:
        BUN_INSTALL_REGISTRY: https://registry.npmmirror.com
    image: claw-web-backend-worker:latest  # 构建后的镜像名称
    container_name: claw-worker-template  # 模板容器（不启动）
    entrypoint: ["tail", "-f", "/dev/null"]  # 保持容器运行但不执行业务逻辑
    profiles: ["build"]  # 仅在显式指定时构建: docker compose --profile build up worker-build
    networks:
      - claude-network

networks:
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data:
    driver: local
  user_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/user-workspaces
  session_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/session-workspaces
  backend_logs:
    driver: local
