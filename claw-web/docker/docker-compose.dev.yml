# Claude Code HAHA - 开发环境 Docker Compose 配置（安全基础版）
#
# 安全特性：
# ✅ 基础能力控制
# ✅ 临时文件系统
# ✅ 资源限制
# ✅ 日志轮转
#
# 说明：
# - 开发环境使用简化配置，保持开发体验
# - 仍然包含基础安全防护
# - 适合本地开发和测试

version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: claude-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-claude_code_haha}
      MYSQL_USER: ${DB_USER:-claude_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword123}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./server/src/db/z_fix_schema.sql:/docker-entrypoint-initdb.d/z_fix_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=100
      - --innodb_buffer_pool_size=134217128
      - --innodb_log_file_size=67108864
      - --innodb_flush_log_at_trx_commit=2
      - --key_buffer_size=16777216
      - --sort_buffer_size=2097152
      - --read_buffer_size=131072
      - --read_rnd_buffer_size=262144
      - --tmp_table_size=16777216
      - --max_heap_table_size=16777216
      - --table_open_cache=400
      - --thread_cache_size=8
      - --slow_query_log=1
      - --long_query_time=2
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
    tmpfs:
      - /tmp:size=64m
      - /var/run/mysqld:size=32m

  # ==================== 后端服务（Bun Runtime） ====================
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: claude-backend-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=384
      - UV_THREADPOOL_SIZE=4
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-3-opus-20240229}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-3-sonnet-20240229}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-claude_user}
      - DB_PASSWORD=${DB_PASSWORD:-userpassword123}
      - DB_NAME=${DB_NAME:-claude_code_haha}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production-min-32-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}
      - WORKSPACE_BASE_DIR=/app/workspaces
      - TENANT_ISOLATION_ENABLED=true
      - MAX_USERS=${MAX_USERS:-100}
      - USER_STORAGE_QUOTA_MB=${USER_STORAGE_QUOTA_MB:-500}
      - USER_SESSION_LIMIT=${USER_SESSION_LIMIT:-10}
      - USER_PTY_LIMIT=${USER_PTY_LIMIT:-5}
      - PTY_ENABLED=${PTY_ENABLED:-true}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILES_PER_USER=${MAX_FILES_PER_USER:-1000}
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-300000}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - DISABLE_TELEMETRY=1
    volumes:
      - user_workspaces:/app/workspaces/users
      - session_workspaces:/app/workspaces/sessions
      - backend_logs:/app/logs
      - ./server:/app:cached
    # ✅ 开发环境简化安全配置
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - MKNOD
    # 开发环境不禁用写权限，方便调试
    read_only: false
    tmpfs:
      - /tmp:size=100m
      - /var/tmp:size=50m
    stdin_open: true
    tty: true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 前端服务（Nginx） ====================
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: claude-frontend-dev
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
        reservations:
          memory: 32m
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=16m
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mysql_data:
    driver: local
  user_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/user-workspaces
  session_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/session-workspaces
  backend_logs:
    driver: local
