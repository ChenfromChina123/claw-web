<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>IDE 浮动电子宠物 (气泡对话版)</title>
    <style>
        :root {
            --bubble-bg: #252526;
            --bubble-border: #454545;
            --text-color: #cccccc;
            --accent-glow: #007acc;
            --control-panel-bg: rgba(30, 30, 30, 0.8);
        }

        body {
            background-color: transparent; /* 背景透明，以便在 IDE 中浮动 */
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; /* IDE 风格字体 */
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        /* 电子宠物主体和气泡的容器 */
        #pet-container {
            position: absolute;
            top: 150px;
            left: 150px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: grab;
            user-select: none;
            width: fit-content;
        }

        /* 气泡对话框 */
        #speech-bubble {
            background: var(--bubble-bg);
            border: 1px solid var(--bubble-border);
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 10px;
            max-width: 250px;
            min-height: 20px;
            line-height: 1.4;
            position: relative;
        }

        /* 气泡尾巴 */
        #speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px; /* 调整位置以连接到宠物 */
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: var(--bubble-border) transparent transparent transparent;
        }

        /* 宠物头像区域 */
        #pet-avatar {
            font-size: 80px;
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.7));
        }

        /* 浮动动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        /* 紧凑型控制面板（输入和切换）*/
        #control-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--control-panel-bg);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid var(--bubble-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(5px);
            opacity: 0.3; /* 闲置时低透明度 */
            transition: opacity 0.3s;
        }

        #control-panel:hover {
            opacity: 1; /* 鼠标悬停时全透明 */
        }

        /* 宠物切换器 */
        .pet-selector {
            display: flex;
            gap: 8px;
        }

        .pet-opt {
            cursor: pointer;
            font-size: 24px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .pet-opt.active {
            opacity: 1;
            transform: scale(1.2);
            filter: drop-shadow(0 0 5px var(--accent-glow));
        }

        /* 输入框 */
        input[type="text"] {
            background: #3c3c3c;
            border: 1px solid #666;
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            outline: none;
            width: 180px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div id="pet-container">
    <div id="speech-bubble">初始化中...</div>
    <div id="pet-avatar">🐲</div>
</div>

<div id="control-panel">
    <div class="pet-selector">
        <span class="pet-opt active" onclick="switchPet('draco')">🐲</span>
        <span class="pet-opt" onclick="switchPet('kraken')">🐙</span>
        <span class="pet-opt" onclick="switchPet('spirit')">💫</span>
        <span class="pet-opt" onclick="switchPet('spider')">🕷️</span>
    </div>
    <input type="text" id="user-input" placeholder="输入代码关键词..." onkeypress="handleInput(event)">
</div>

<script>
    // --- 拖拽逻辑 ---
    const container = document.getElementById('pet-container');
    let isDragging = false;
    let offsetX, offsetY;

    container.onmousedown = (e) => {
        if (e.target.id === 'user-input' || e.target.closest('.pet-opt')) return; // 防止在输入或切换时拖动
        isDragging = true;
        container.style.cursor = 'grabbing';
        offsetX = e.clientX - container.offsetLeft;
        offsetY = e.clientY - container.offsetTop;
    };

    document.onmousemove = (e) => {
        if (!isDragging) return;
        container.style.left = (e.clientX - offsetX) + 'px';
        container.style.top = (e.clientY - offsetY) + 'px';
    };

    document.onmouseup = () => {
        isDragging = false;
        container.style.cursor = 'grab';
    };

    // --- 宠物数据 (增加了更多类型，移除了经典 Bot) ---
    const pets = {
        draco: { char: '🐲', name: '像素火龙 (Draco)', moods: { idle: '守护着这行代码...', happy: '代码优化完成，吐一口火庆祝！🔥', sad: '发生了语法错误！😠' } },
        kraken: { char: '🐙', name: '代码章鱼 (Kraken)', moods: { idle: '整理复杂的依赖关系...', happy: '嘿嘿，我发现了未定义的行为！🤯', sad: '这行代码看起来太乱了...墨水喷溅！🕶️' } },
        spirit: { char: '💫', name: '数据精灵 (Spirit)', moods: { idle: '在内存中寻找灵感...', happy: '逻辑完美！闪耀着光芒✨💖', sad: '被垃圾回收器追赶了...🏃' } },
        spider: { char: '🕷️', name: '除虫蜘蛛 (Spider)', moods: { idle: '在代码网格中编织...', happy: '捕获了一个 Bug！我把它挂在网上🕸️🧐', sad: '这个 Bug 隐藏得太深了...' } }
    };

    let currentPetKey = 'draco';

    function switchPet(key) {
        currentPetKey = key;
        document.querySelectorAll('.pet-opt').forEach(el => el.classList.remove('active'));
        // 查找正确的 HTML 元素以添加 active 类
        const opts = document.querySelectorAll('.pet-opt');
        for (let i = 0; i < opts.length; i++) {
            if (opts[i].innerText === pets[key].char) {
                opts[i].classList.add('active');
                break;
            }
        }
        updateUI(pets[key].char, pets[key].moods.idle);
    }

    function updateUI(avatarChar, text) {
        const avatar = document.getElementById('pet-avatar');
        const bubble = document.getElementById('speech-bubble');
        avatar.innerText = avatarChar;
        bubble.innerText = text;
        
        // 瞬间放大反馈
        avatar.style.transform = 'scale(1.2)';
        setTimeout(() => avatar.style.transform = 'scale(1)', 200);
    }

    // --- 输入响应逻辑 ---
    function handleInput(e) {
        if (e.key === 'Enter') {
            const input = e.target.value.toLowerCase();
            const speech = document.getElementById('speech-bubble');
            const petData = pets[currentPetKey];
            
            if (input.includes('error') || input.includes('crash')) {
                updateUI('😱', petData.moods.sad); // 惊恐表情
            } else if (input.includes('love') || input.includes('cool') || input.includes('optimize')) {
                updateUI('🥰', petData.moods.happy); // 爱心表情
            } else if (input.includes('clean') || input.includes('format')) {
                updateUI('✨', '代码格式化完成，焕然一新！');
            } else if (input.includes('bug')) {
                if (currentPetKey === 'spider') {
                    updateUI('🕷️捕获！', '找到了！Bug 已经被我缠住了！🕸️');
                } else {
                    updateUI('😨', '我不喜欢 Bug... 快清理掉！');
                }
            } else if (input.includes('code') || input.includes('script')) {
                if (currentPetKey === 'draco') {
                    updateUI('🛡️', '我正在守护这行核心代码！');
                } else {
                    updateUI('📝', '代码编写中...我正在给你灵感！');
                }
            } else {
                updateUI(petData.char, `我说："${input}"？我不明白，但我大受震撼。`);
            }
            
            e.target.value = ''; // 清空输入
        }
    }

    // --- 初始化 ---
    switchPet('draco'); // 默认选择火龙

</script>

</body>
</html>
