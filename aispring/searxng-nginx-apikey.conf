# SearXNG API Key 验证配置
# 将此配置添加到 Nginx 的 server 块中

# API Key 配置（可以设置多个）
# 生产环境建议使用环境变量：$SEARCH_API_KEY
set $valid_api_key_1 "sk-aispring-2026-secure-key-xyz789";
set $valid_api_key_2 "your-second-api-key-here";

# 验证 API Key
location /search {
    # 从请求参数或请求头获取 API Key
    set $api_key $arg_apiKey;
    
    # 如果参数中没有，尝试从请求头获取
    if ($http_x_api_key) {
        set $api_key $http_x_api_key;
    }
    
    # 验证 API Key
    if ($api_key != $valid_api_key_1) {
        if ($api_key != $valid_api_key_2) {
            return 401 '{"code": 401, "message": "无效的 API Key"}';
        }
    }
    
    # 验证通过，代理到 SearXNG
    proxy_pass http://127.0.0.1:8080/search;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 增加超时时间
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # 缓冲配置
    proxy_buffering off;
    proxy_cache off;
}

# 其他路径不需要验证（如主页、静态资源等）
location / {
    proxy_pass http://127.0.0.1:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
