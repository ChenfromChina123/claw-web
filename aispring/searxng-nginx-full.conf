# SearXNG Nginx 配置（带 API Key 验证）
# 适用于宝塔面板或独立 Nginx 服务器

server {
    listen 80;
    server_name search.aistudy.icu;
    
    # 字符集
    charset utf-8;
    
    # 访问日志
    access_log /www/wwwlogs/search.aistudy.icu_access.log;
    error_log /www/wwwlogs/search.aistudy.icu_error.log;
    
    # SSL 证书验证目录（必须允许访问，不需要 API Key）
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/search_aistudy_icu;
        allow all;
    }
    
    # 搜索接口（需要 API Key 验证）
    location /search {
        # 执行 Lua 脚本验证 API Key
        access_by_lua_file /etc/nginx/lua/api_key_check.lua;
        
        # 验证通过，代理到 SearXNG
        proxy_pass http://127.0.0.1:9080/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_cache off;
    }
    
    # 其他路径（不需要 API Key）
    location / {
        proxy_pass http://127.0.0.1:9080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_cache off;
    }
}

# HTTPS 配置（推荐）
server {
    listen 443 ssl http2;
    server_name search.aistudy.icu;
    
    # SSL 证书配置
    ssl_certificate /www/server/panel/vhost/cert/search.aistudy.icu/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/search.aistudy.icu/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 字符集
    charset utf-8;
    
    # 访问日志
    access_log /www/wwwlogs/search.aistudy.icu_ssl_access.log;
    error_log /www/wwwlogs/search.aistudy.icu_ssl_error.log;
    
    # SSL 证书验证目录（不需要 API Key）
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/search_aistudy_icu;
        allow all;
    }
    
    # 搜索接口（需要 API Key 验证）
    location /search {
        # 执行 Lua 脚本验证 API Key
        access_by_lua_file /etc/nginx/lua/api_key_check.lua;
        
        # 验证通过，代理到 SearXNG
        proxy_pass http://127.0.0.1:9080/search;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-SSL $scheme;
        
        # 增加超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_cache off;
    }
    
    # 其他路径（不需要 API Key）
    location / {
        proxy_pass http://127.0.0.1:9080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-SSL $scheme;
        
        # 增加超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 缓冲配置
        proxy_buffering off;
        proxy_cache off;
    }
}

