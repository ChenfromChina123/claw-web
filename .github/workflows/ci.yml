# Claude Code HAHA CI/CD 配置

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: 安装依赖
        working-directory: server
        run: npm ci
      
      - name: 运行类型检查
        working-directory: server
        run: npm run type-check || true
      
      - name: 运行测试
        working-directory: server
        run: npm test
      
      - name: 生成测试覆盖率报告
        working-directory: server
        run: npm run test:coverage || true
      
      - name: 上传覆盖率报告
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: coverage-report
          path: server/coverage
          retention-days: 7

  lint:
    name: 代码检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: 安装依赖
        working-directory: server
        run: npm ci
      
      - name: 运行 ESLint
        working-directory: server
        run: npm run lint || true

  build:
    name: 构建
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: 安装依赖
        working-directory: server
        run: npm ci
      
      - name: 构建项目
        working-directory: server
        run: npm run build || npm run compile || true

  # Windows 平台测试
  test-windows:
    name: Windows 测试
    runs-on: windows-latest
    if: false  # 禁用直到配置完成
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: 安装依赖
        working-directory: server
        run: npm ci
      
      - name: 运行测试
        working-directory: server
        run: npm test
