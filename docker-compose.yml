# Claw-Web Master-Worker 架构 - Docker Compose 编排文件
#
# 服务架构：
# ┌─────────────┐    ┌─────────────┐    ┌─────────────┐
# │   Frontend   │───▶│   Master    │───▶│    MySQL     │
# │  (Nginx:80)  │    │ (Bun:3000)  │    │ (3306)      │
# └─────────────┘    └──────┬──────┘    └─────────────┘
#                           │
##                    ┌──────┴──────┐
#                    │   Worker ×N  │
#                    │ (Bun:4000)  │
#                    └─────────────┘

version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: claw-web-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-clawweb2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-claw_web}
      MYSQL_USER: ${MYSQL_USER:-clawuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clawpass2024}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/master/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./server/src/master/db/add_user_tier.sql:/docker-entrypoint-initdb.d/02-user-tier.sql:ro
      - ./server/src/master/db/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-clawweb2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb-buffer-pool-size=256M

  # ==================== Master 服务（控制层）====================
  master:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production-master
      args:
        ENTRY_POINT: master
    container_name: claw-web-master
    restart: unless-stopped
    environment:
      # 角色配置
      CONTAINER_ROLE: master
      NODE_ENV: production
      TZ: Asia/Shanghai
      
      # 端口配置
      PORT: 3000
      
      # 数据库配置（Master 需要连接数据库）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-clawuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-clawpass2024}
      DB_NAME: ${MYSQL_DATABASE:-claw_web}
      
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # 容器编排配置
      CONTAINER_POOL_MIN_SIZE: ${CONTAINER_POOL_MIN_SIZE:-3}
      CONTAINER_POOL_MAX_SIZE: ${CONTAINER_POOL_MAX_SIZE:-10}
      CONTAINER_IDLE_TIMEOUT_MS: ${CONTAINER_IDLE_TIMEOUT_MS:-300000}
      CONTAINER_BASE_PORT: ${CONTAINER_BASE_PORT:-3100}
      WORKER_IMAGE_NAME: claw-web-backend-worker:latest
      
      # 内部通信 Token（必须与 Worker 一致）
      MASTER_INTERNAL_TOKEN: ${MASTER_INTERNAL_TOKEN:-internal-master-worker-token-2024}
      
      # 工作空间配置
      HOST_WORKSPACE_PATH: /data/claws/workspaces
      WORKSPACE_BASE_DIR: /app/workspaces
      
      # Anthropic API 配置（用于 Agent）
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      
      # 阿里云百炼（通义千问）API 配置
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      
      # LLM 模型选择配置
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      
      # Docker 配置（Master 需要 Docker socket 来管理容器）
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      
      # 监控配置
      DISK_WARNING_THRESHOLD: ${DISK_WARNING_THRESHOLD:-80}
      DISK_CRITICAL_THRESHOLD: ${DISK_CRITICAL_THRESHOLD:-90}
      ENABLE_DOCKER_AUTO_CLEANUP: ${ENABLE_DOCKER_AUTO_CLEANUP:-true}

      # SMTP 邮件配置
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

      # PTY 终端配置（生产模式启用）
      PTY_ENABLED: ${PTY_ENABLED:-true}
    ports:
      - "${MASTER_PORT:-3000}:3000"
    volumes:
      - ${HOST_WORKSPACE_PATH:-/data/claws/workspaces}:/app/workspaces
      - master_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock  # Docker socket 访问权限
    networks:
      - claude-network      # 访问 MySQL
      - worker-network      # 访问 Worker 容器
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== Worker 服务（执行层）====================
  # 注意：Worker 容器通常由 Master 动态创建和管理
  # 此服务定义了用于创建热备容器的镜像
  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production-worker
      args:
        ENTRY_POINT: worker
    image: claw-web-backend-worker:latest  # 显式命名镜像
    container_name: claw-web-worker-template
    restart: unless-stopped
    environment:
      # 角色配置
      CONTAINER_ROLE: worker
      NODE_ENV: production
      TZ: Asia/Shanghai

      # 端口配置
      PORT: 4000
      WORKER_INTERNAL_PORT: 4000

      # 内部通信 Token（必须与 Master 一致）
      MASTER_INTERNAL_TOKEN: ${MASTER_INTERNAL_TOKEN:-internal-master-worker-token-2024}

      # 工作空间配置
      WORKSPACE_DIR: /workspace
      USER_ID: template-user

      # Anthropic API 配置（Worker 执行 Agent 时需要）
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      
      # 阿里云百炼（通义千问）API 配置
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      
      # LLM 模型选择配置
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}

      # PTY 终端配置（生产模式启用）
      PTY_ENABLED: ${PTY_ENABLED:-true}

      # 资源限制
      WORKER_MAX_MEMORY_MB: 256
      WORKER_MAX_THREADS: 2
    volumes:
      - worker_workspace:/workspace
      - worker_logs:/app/logs
    networks:
      - worker-network  # 仅在 worker-network，无法访问 claude-network (MySQL)
    # Worker 不依赖数据库！这是安全设计
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/internal/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    profiles:
      - worker  # 默认不启动，仅作为模板镜像使用

  # ==================== 前端服务（Nginx）====================
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: claw-web-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - frontend-network
      - claude-network  # 需要访问 master:3000 进行 API 反向代理
    depends_on:
      - master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# ==================== 网络配置 ====================
networks:
  # 公共网络：前端可访问
  frontend-network:
    driver: bridge
  
  # Master + MySQL 网络：包含数据库访问权限
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  
  # Worker 网络：隔离网络，Worker 无法访问 MySQL
  worker-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
    # 安全说明：Worker 容器只能在此网络中运行
    # 即使应用层被绕过，也无法直接连接到 MySQL

# ==================== 数据卷配置 ====================
volumes:
  mysql_data:
    driver: local
    name: claw-web-mysql-data

  master_logs:
    driver: local
    name: claw-web-master-logs
    
  worker_workspace:
    driver: local
    name: claw-web-worker-workspace
    
  worker_logs:
    driver: local
    name: claw-web-worker-logs
