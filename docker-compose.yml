# Claude Code HAHA - 多租户 Docker Compose 配置
#
# 特性：
# ✅ 完整的多租户用户隔离
# ✅ 资源配额管理
# ✅ 自动扩容支持
# ✅ 生产级部署配置
#
# 使用说明：
# 1. 复制 .env.example 为 .env 并填写配置
# 2. 运行: docker-compose up -d
# 3. 访问: http://localhost (前端) | http://localhost:3000/api (后端 API)
#
# 多租户隔离机制：
# - 应用层：每个用户拥有独立的工作目录（workspaces/users/{userId}）
# - 会话层：每个会话有独立的临时空间（workspaces/sessions/{userId}/{sessionId}）
# - 进程层：PTY 终端按用户隔离，限制并发数
# - 资源层：存储配额、会话数限制、文件数量限制

version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: claude-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: ${DB_NAME:-claude_code_haha}
      MYSQL_USER: ${DB_USER:-claude_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-userpassword123}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - ./server/src/db/fix_schema.sql:/docker-entrypoint-initdb.d/fix_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存（可选） ====================
  redis:
    image: redis:7-alpine
    container_name: claude-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== 后端服务（Bun Runtime） ====================
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: claude-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # 运行环境
      - NODE_ENV=production

      # API 密钥配置
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=${ANTHROPIC_DEFAULT_HAIKU_MODEL:-claude-3-haiku-20240307}
      - ANTHROPIC_DEFAULT_OPUS_MODEL=${ANTHROPIC_DEFAULT_OPUS_MODEL:-claude-3-opus-20240229}
      - ANTHROPIC_DEFAULT_SONNET_MODEL=${ANTHROPIC_DEFAULT_SONNET_MODEL:-claude-3-sonnet-20240229}

      # 数据库配置
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-claude_user}
      - DB_PASSWORD=${DB_PASSWORD:-userpassword123}
      - DB_NAME=${DB_NAME:-claude_code_haha}

      # JWT 认证配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production-min-32-chars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}

      # 邮件配置（可选）
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@example.com}

      # 工作区配置
      - WORKSPACE_BASE_DIR=/app/workspaces

      # ⭐ 多租户隔离配置（核心功能）
      - TENANT_ISOLATION_ENABLED=true
      - MAX_USERS=${MAX_USERS:-100}
      - USER_STORAGE_QUOTA_MB=${USER_STORAGE_QUOTA_MB:-500}
      - USER_SESSION_LIMIT=${USER_SESSION_LIMIT:-10}
      - USER_PTY_LIMIT=${USER_PTY_LIMIT:-5}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-10}
      - MAX_FILES_PER_USER=${MAX_FILES_PER_USER:-1000}

      # 性能优化
      - API_TIMEOUT_MS=${API_TIMEOUT_MS:-300000}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - DISABLE_TELEMETRY=1
    volumes:
      # 用户工作区数据持久化（核心：实现用户隔离）
      - user_workspaces:/app/workspaces/users
      - session_workspaces:/app/workspaces/sessions
      # 日志目录
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    # 资源限制（防止单个用户占用过多资源）
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ==================== 前端服务（Nginx） ====================
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: claude-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - claude-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  claude-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  # 数据持久化卷
  mysql_data:
    driver: local
  redis_data:
    driver: local
  # ⭐ 用户隔离数据卷（关键：每个用户的独立空间）
  user_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/user-workspaces
  session_workspaces:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/docker-data/session-workspaces
  backend_logs:
    driver: local
